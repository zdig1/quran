    <!-- ===== SCRIPT OPTIMISÉ ===== -->
    <script>
        (function () {
            const modules = [
                'quran-calculator.js',
                'quran-reader.js',
                'overlays-manager.js',
                'tafsir-search.js',
                'main.js'
            ];

            const loadScript = (src) => {
                return new Promise((resolve, reject) => {
                    const script = document.createElement('script');
                    script.src = src;
                    script.async = false;

                    script.onload = resolve;
                    script.onerror = () => reject(new Error(`Erreur: ${src}`));

                    document.head.appendChild(script);
                });
            };

            const loadSequential = async (list) => {
                for (const src of list) {
                    await loadScript(src);
                }
            };

            window.addEventListener('DOMContentLoaded', async () => {
                try {
                    await loadSequential(modules);

                    if (window.quranApp && typeof window.quranApp.init === 'function') {
                        window.quranApp.init();
                    }
                } catch (error) {
                    document.getElementById('pageScroll').innerHTML = `
                        <div class="loading-placeholder">
                            <h3 style="color: var(--error);">خطأ في تحميل التطبيق</h3>
                            <p>الرجاء تحديث الصفحة</p>
                        </div>
                    `;
                }
            });
        })();

    <script>
        window.addEventListener('error', function (event) {
            if (window.quranApp) {
                window.quranApp.showToast("⚠️ حدث خطأ غير متوقع");
            }
        });
        window.addEventListener('unhandledrejection', function (event) {
            event.preventDefault();
            const reason = event.reason?.message || event.reason || 'Erreur inconnue';
            const silent = ['fetch', 'network', 'Failed to fetch', 'Timeout'];
            if (silent.some(k => String(reason).toLowerCase().includes(k.toLowerCase()))) return;
            if (window.quranApp) {
                window.quranApp.showToast('⚠️ حدث خطأ غير متوقع');
            }
        });
    </script>
